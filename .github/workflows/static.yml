# 网页部署（GitHub Pages）
name: ⚗️网页部署

on:
  push:
    branches: ["main"]
    paths:
      - 'dist/**'
      - '.github/workflows/static.yml'
  workflow_dispatch:

# Pages 所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 防止并发冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      # ✅ 1. 浅克隆（提速）
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # ✅ 2. 配置 Pages（已修复 TypeError）
      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          static_site_generator: none   # ✅ 不加 enablement

      # ✅ 3. 清理无用文件（减小体积）
      - name: Clean dist
        run: |
          find dist -name "*.map" -delete || true
          find dist -name "__pycache__" -exec rm -rf {} + || true
          echo "Dist size:"
          du -sh dist

      # ✅ 4. 上传 Pages 产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'dist'

      # ✅ 5. 正式部署
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
