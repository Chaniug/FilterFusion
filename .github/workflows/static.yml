name: ⚗️网页部署

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true   # ✅ 新的推送可取消正在运行的旧部署

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Create .nojekyll
        run: touch dist/.nojekyll    # ✅ 禁止 Jekyll 处理，纯静态文件提速

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5