name: 每周自动打包发布

on:
  schedule:
    - cron: '0 2 * * 0'  # 每周日（UTC 2点，北京时间10点）自动触发
  workflow_dispatch:

permissions:
  contents: write  # 允许创建 Tag 和 Release

concurrency:
  group: weekly-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: 🛠️ 检出仓库
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: 📦 打包 adblock 文件
      run: |
        cd dist
        zip ../adblock-weekly.zip adblock-*.txt
        cd ..

    - name: 📊 统计规则文件数量
      id: stats
      run: |
        FILE_COUNT=$(ls -1 dist/adblock-*.txt 2>/dev/null | wc -l)
        # 只统计实际规则行（排除注释、空行、分类分隔行）
        RULE_COUNT=$(cat dist/adblock-*.txt 2>/dev/null | grep -vcE '^\s*(!|\[|$)' || echo 0)
        echo "FILE_COUNT=$FILE_COUNT" >> $GITHUB_ENV
        echo "LINE_COUNT=$RULE_COUNT" >> $GITHUB_ENV

    - name: 🏷️ 自动生成版本号并创建 Tag
      id: version
      run: |
        DATE=$(date +'%Y.%m.%d')
        echo "VERSION=$DATE" >> $GITHUB_ENV
        # 配置 Git 身份
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # 先拉取最新代码
        git pull origin main
        # 如果 tag 已存在，先删除本地和远程的旧 tag
        if git rev-parse "$DATE" >/dev/null 2>&1; then
          echo "⚠️ Tag $DATE 已存在，删除旧 tag 并重建..."
          git tag -d "$DATE"
          git push origin ":refs/tags/$DATE"
        fi
        # 创建新 Tag
        git tag "$DATE"
        git push origin "$DATE"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 🚀 创建 Release 并上传资源
      uses: softprops/action-gh-release@v3
      with:
        tag_name: "${{ env.VERSION }}"
        name: "FilterFusion Weekly · ${{ env.VERSION }}"
        body: |
          🎉 **每周规则集自动发布** 🎉

          > 又是崭新的一周，FilterFusion 为您带来最新鲜的广告拦截规则！

          ## 📋 本周更新内容
          - ✨ 新增/更新多套广告拦截规则
          - 🔥 包含所有 dist 目录下以 `adblock-` 开头的规则文件
          - 🛡️ 适用于各类主流广告拦截器

          ## 📊 规则统计
          - 📁 **规则文件数：** ${{ env.FILE_COUNT }} 个
          - 📝 **规则条数：** ${{ env.LINE_COUNT }} 条
          - 🎯 这周规则库又壮大了！不断进化中... ⚡

          ## 🎯 快速开始
          1. 下载 `adblock-weekly.zip`
          2. 解压后将 `.txt` 文件导入你的广告拦截器
          3. 享受无广告的清爽上网体验！

          ---

          💡 **小贴士：** 定期更新规则集能获得更好的拦截效果！

          🙏 如果对规则有建议或发现误杀，欢迎提交 Issue 或 PR！

          **感谢您的支持！** 🌟
        files: |
          adblock-weekly.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
