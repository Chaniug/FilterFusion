name: 每周自动打包发布

on:
  schedule:
    - cron: '0 2 * * 0'  # 每周日（UTC 2点，北京时间10点）自动触发
  workflow_dispatch:

permissions:
  contents: write  # 允许创建 Tag 和 Release

concurrency:
  group: weekly-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: 🛠️ 检出仓库
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: 📦 打包规则文件
      run: |
        cd dist
        zip ../weekly-rules.zip adblock-main.txt adblock-*.txt dns-blocklist.txt dns-blocklist-*.txt
        cd ..

    - name: 📊 统计规则文件数量
      id: stats
      run: |
        FILE_COUNT=$(ls -1 dist/adblock-*.txt dist/dns-blocklist-*.txt 2>/dev/null | wc -l)
        ADBLOCK_COUNT=$(cat dist/adblock-*.txt dist/adblock-main.txt 2>/dev/null | grep -vcE '^\s*(!|\[|$)' || echo 0)
        DNS_COUNT=$(cat dist/dns-blocklist-*.txt dist/dns-blocklist.txt 2>/dev/null | grep -vcE '^\s*(!|\[|$)' || echo 0)
        TOTAL_COUNT=$(( ADBLOCK_COUNT + DNS_COUNT ))
        echo "FILE_COUNT=$FILE_COUNT" >> $GITHUB_ENV
        echo "ADBLOCK_COUNT=$ADBLOCK_COUNT" >> $GITHUB_ENV
        echo "DNS_COUNT=$DNS_COUNT" >> $GITHUB_ENV
        echo "LINE_COUNT=$TOTAL_COUNT" >> $GITHUB_ENV

    - name: 🏷️ 自动生成版本号、截止日期和引语
      id: version
      run: |
        DATE=$(date +'%Y.%m.%d')
        WEEK_END=$(date -u +'%Y-%m-%d')
        WEEK_START=$(date -u -d '6 days ago' +'%m/%d')
        echo "VERSION=$DATE" >> $GITHUB_ENV
        echo "WEEK_START=$WEEK_START" >> $GITHUB_ENV
        echo "WEEK_END=$WEEK_END" >> $GITHUB_ENV
        # 配置 Git 身份
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # 先拉取最新代码
        git pull origin main
        # 如果 tag 已存在，先删除本地和远程的旧 tag
        if git rev-parse "$DATE" >/dev/null 2>&1; then
          echo "⚠️ Tag $DATE 已存在，删除旧 tag 并重建..."
          git tag -d "$DATE"
          git push origin ":refs/tags/$DATE"
        fi
        # 创建新 Tag
        git tag "$DATE"
        git push origin "$DATE"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 🚀 创建 Release 并上传资源
      uses: softprops/action-gh-release@v3
      with:
        tag_name: "${{ env.VERSION }}"
        name: "FilterFusion Weekly · ${{ env.VERSION }}"
        body: |
          🎉 **FilterFusion Weekly · ${{ env.VERSION }}** 🎉

          > 📅 覆盖周期：**${{ env.WEEK_START }} — ${{ env.WEEK_END }}** · 自动抓取 + 合并去重 + 分发

          ## 📋 本周更新内容
          - 🟦 **AdBlock 规则** `${{ env.ADBLOCK_COUNT }}` 条 — 浏览器广告拦截
          - 🟪 **DNS 过滤规则** `${{ env.DNS_COUNT }}` 条 — 网络级广告拦截
          - 🔥 双管道规则集，适用于各类主流广告拦截器和 DNS 过滤工具

          ## 📊 本周统计
          | 指标 | 数值 |
          |------|:---:|
          | 📁 规则文件数 | ${{ env.FILE_COUNT }} 个 |
          | 🟦 AdBlock 规则 | ${{ env.ADBLOCK_COUNT }} 条 |
          | 🟪 DNS 规则 | ${{ env.DNS_COUNT }} 条 |
          | 📝 合计 | ${{ env.LINE_COUNT }} 条 |

          ## 🎯 快速订阅

          **AdBlock（浏览器）**
          ```
          https://cdn.jsdelivr.net/gh/Chaniug/FilterFusion@main/dist/adblock-main.txt
          ```

          **DNS（网络级）**
          ```
          https://cdn.jsdelivr.net/gh/Chaniug/FilterFusion@main/dist/dns-blocklist.txt
          ```

          ## 📦 附件说明
          - `weekly-rules.zip` — 包含所有 AdBlock 和 DNS 规则文件，解压即用

          ---

          💡 **小贴士：** 推荐使用上方订阅链接自动更新，无需手动下载。

          🙏 发现误杀或漏拦截？[提交 Issue](https://github.com/Chaniug/FilterFusion/issues) 告诉我们！

          **感谢您的支持！** 🌟
        files: |
          weekly-rules.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
