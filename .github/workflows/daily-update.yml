name: 每日自动更新

on:
  schedule:
    - cron: '0 0 * * *'  # UTC每天午夜 = 北京时间早上8点
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: 🛠️ 检出仓库
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: 📦 安装 uv + Python 3.13
      uses: astral-sh/setup-uv@v8
      with:
        python-version: '3.13'
        enable-cache: true
        cache-dependency-glob: 'requirements.txt'

    - name: 📥 安装依赖
      run: |
        uv venv
        uv pip install -r requirements.txt

    - name: 🔄 抓取并合并规则
      run: |
        uv run --no-project python -m scripts.fetch_rules
        uv run --no-project python -m scripts.merge_rules

    - name: 🧹 清理旧的规则文件 (仅保留最近3天)
      run: find dist -name "adblock-[0-9]*.txt" -mtime +2 -delete

    - name: ✅ 校验规则文件
      run: |
        if [ ! -s dist/adblock-main.txt ]; then
          echo "❌ 错误: dist/adblock-main.txt 不存在或为空，终止提交"
          exit 1
        fi
        echo "✅ 规则文件校验通过: $(wc -l < dist/adblock-main.txt) 行"

    - name: 📤 提交变更
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "FilterFusion Bot"
        git config user.email "filterfusion-bot@users.noreply.github.com"

        # GitHub Actions 本地产出（dist/）为最高优先级
        # 始终以 origin/main 为基础，保留本地生成的规则文件
        git fetch origin main
        git reset --soft origin/main
        git checkout origin/main -- ':!dist'
        git add dist

        if git diff-index --quiet HEAD; then
          echo "没有规则变更，跳过提交"
        else
          git commit -m "FilterFusion自动更新: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
        fi
