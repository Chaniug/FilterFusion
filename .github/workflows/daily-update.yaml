name: 🧬每日自动更新

on:
  schedule:
    - cron: '0 0 * * *'      # UTC 0:00 = 北京时间 8:00
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: 🛠️ 检出仓库
      uses: actions/checkout@v7.0.0
      with:
        fetch-depth: 1
        token: ${{ secrets.PAT }}   # ✅ 使用 PAT 触发 Pages

    - name: 📦 安装 uv + Python 3.14
      uses: astral-sh/setup-uv@v8.2.0
      with:
        python-version: '3.14'
        enable-cache: true
        cache-dependency-glob: |
          requirements.txt
          pyproject.toml

    - name: 📥 安装依赖
      run: |
        uv venv
        uv pip install -r requirements.txt

    - name: 🔄 并行抓取规则（AdBlock + DNS）
      run: |
        set -e
        uv run --no-project python -m scripts.fetch_rules &
        pid1=$!
        uv run --no-project python -m scripts.fetch_dns_rules &
        pid2=$!
        wait $pid1
        wait $pid2

    - name: 🔀 合并规则（AdBlock + DNS）
      run: |
        uv run --no-project python -m scripts.merge_rules
        uv run --no-project python -m scripts.merge_dns_rules

    - name: 🧹 清理旧的规则文件（仅保留今日）
      run: |
        mkdir -p dist
        today=$(date -u +%Y%m%d)
        echo "📅 今日日期: $today"

        echo "🗑️ 清理非今日的 AdBlock 规则"
        find dist -maxdepth 1 -type f -name "adblock-[0-9]*.txt" ! -name "adblock-${today}.txt" -delete || true

        echo "🗑️ 清理非今日的 DNS 规则"
        find dist -maxdepth 1 -type f -name "dns-blocklist-[0-9]*.txt" ! -name "dns-blocklist-${today}.txt" -delete || true

        echo "✅ 当前 dist 目录："
        ls -lh dist/

    - name: ✅ 校验规则文件（AdBlock + DNS）
      run: |
        for f in dist/adblock-main.txt dist/dns-blocklist.txt; do
          if [ ! -s "$f" ]; then
            echo "❌ 错误: $f 不存在或为空"
            exit 1
          fi
          echo "✅ $f: $(wc -l < "$f") 行"
        done

    - name: 🧹 清理临时规则文件
      run: |
        echo "🗑️ 清理 scripts 目录中的临时 .txt 规则文件"
        find scripts -maxdepth 1 -type f -name '*.txt' -delete || true
        echo "✅ scripts 目录已清理"
        ls -1 scripts/

    - name: 📤 提交变更（使用 PAT 触发 Pages）
      env:
        TOKEN: ${{ secrets.PAT }}
      run: |
        git config user.name "FilterFusion Bot"
        git config user.email "filterfusion-bot@users.noreply.github.com"

        git add dist config scripts

        if git diff --cached --quiet; then
          echo "ℹ️ 没有规则变更，跳过提交"
        else
          git commit -m "FilterFusion自动更新: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git"
          git push origin HEAD:main
        fi
