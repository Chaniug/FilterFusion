name: 🧬每日自动更新

on:
  schedule:
    - cron: '0 0 * * *'      # UTC 0:00 = 北京时间 8:00
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: 🛠️ 检出仓库
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
        token: ${{ secrets.PAT }}   # ✅ 使用 PAT 触发 Pages

    - name: 📦 安装 uv + Python 3.14
      uses: astral-sh/setup-uv@v8.2.0
      with:
        python-version: '3.14'
        enable-cache: true
        cache-dependency-glob: 'requirements.txt'

    - name: 📥 安装依赖
      run: |
        uv venv
        uv pip install -r requirements.txt

    - name: 🔄 抓取并合并规则（AdBlock + DNS）
      run: |
        uv run --no-project python -m scripts.fetch_rules
        uv run --no-project python -m scripts.merge_rules
        uv run --no-project python -m scripts.fetch_dns_rules
        uv run --no-project python -m scripts.merge_dns_rules

    - name: 🧹 清理旧的规则文件（仅保留今日）
      run: |
        today=$(date -u +%Y%m%d)
        echo "📅 今日日期: $today"

        echo "🗑️ 清理非今日的 AdBlock 规则"
        find dist -maxdepth 1 -type f -name "adblock-[0-9]*.txt" ! -name "adblock-${today}.txt" -delete || true

        echo "🗑️ 清理非今日的 DNS 规则"
        find dist -maxdepth 1 -type f -name "dns-blocklist-[0-9]*.txt" ! -name "dns-blocklist-${today}.txt" -delete || true

        echo "✅ 当前 dist 目录："
        ls -lh dist/

    - name: ✅ 校验规则文件（AdBlock + DNS）
      run: |
        if [ ! -s dist/adblock-main.txt ]; then
          echo "❌ 错误: dist/adblock-main.txt 不存在或为空"
          exit 1
        fi
        echo "✅ AdBlock 规则: $(wc -l < dist/adblock-main.txt) 行"

        if [ ! -s dist/dns-blocklist.txt ]; then
          echo "❌ 错误: dist/dns-blocklist.txt 不存在或为空"
          exit 1
        fi
        echo "✅ DNS 规则: $(wc -l < dist/dns-blocklist.txt) 行"

    - name: 📤 提交变更（使用 PAT 触发 Pages）
      env:
        TOKEN: ${{ secrets.PAT }}
      run: |
        git config user.name "FilterFusion Bot"
        git config user.email "filterfusion-bot@users.noreply.github.com"

        git fetch origin main
        git reset --soft origin/main
        git checkout origin/main -- ':!dist' ':!config' ':!scripts'
        git add dist config scripts

        if git diff-index --quiet HEAD; then
          echo "ℹ️ 没有规则变更，跳过提交"
        else
          git commit -m "FilterFusion自动更新: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git
        fi
