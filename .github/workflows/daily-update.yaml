name: 🧬 每日自动更新

on:
  schedule:
    - cron: '0 0 * * *'      # UTC 0:00 = 北京时间 8:00
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      deploy: ${{ steps.commit-and-push.outputs.deploy }}

    steps:
    - name: 🛠️ 检出仓库
      uses: actions/checkout@v7.0.0
      with:
        fetch-depth: 1
        token: ${{ secrets.PAT }}   # ✅ 使用 PAT 触发 Pages
        persist-credentials: false   # ✅ 禁止 post 步骤清理时报错

    - name: 📦 安装 uv + Python 3.14
      uses: astral-sh/setup-uv@v8.2.0
      with:
        python-version: '3.14'
        enable-cache: true
        cache-dependency-glob: |
          requirements.txt
          pyproject.toml

    - name: 📥 安装依赖
      run: |
        uv venv
        uv pip install -r requirements.txt

    - name: 🚀 抓取 + 合并所有规则（单进程）
      run: uv run --no-project python -m scripts.run_all

    - name: ✅ 校验规则文件（AdBlock + PC + DNS + 自定义）
      run: |
        # 校验核心文件（必须存在且非空）
        for f in dist/adblock-mo.txt dist/adblock-pc.txt dist/dns-blocklist.txt; do
          if [ ! -s "$f" ]; then
            echo "❌ 错误: $f 不存在或为空"
            exit 1
          fi
          echo "✅ $f: $(wc -l < "$f") 行"
        done

        # 列举自定义组合规则文件（可选，非空则显示行数）
        echo "📦 自定义规则文件:"
        for f in dist/*.txt; do
          case "$f" in
            dist/adblock-mo.txt|dist/adblock-pc.txt|dist/dns-blocklist.txt) ;;
            *) echo "  ✅ $f: $(wc -l < "$f") 行" ;;
          esac
        done

    - name: 🧹 清理临时规则文件与缓存
      run: |
        echo "🗑️ 清理 scripts 目录中的临时 .txt 规则文件"
        find scripts -maxdepth 1 -type f -name '*.txt' -delete || true

        echo "🗑️ 清理 Python 字节码缓存"
        find scripts -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true

        echo "✅ scripts 目录已清理"
        ls -1 scripts/

    - name: 📤 提交变更（使用 PAT 触发 Pages）
      id: commit-and-push
      env:
        TOKEN: ${{ secrets.PAT }}
      run: |
        git config user.name "FilterFusion Bot"
        git config user.email "filterfusion-bot@users.noreply.github.com"

        # 拉取远程最新（浅克隆友好，不需要完整历史）
        git fetch --depth=1 origin main

        # 同步到远程最新，保留工作区生成的规则文件
        git reset --soft origin/main

        git add dist config scripts

        if git diff --cached --quiet; then
          echo "ℹ️ 没有规则变更，跳过提交"
          echo "deploy=false" >> "$GITHUB_OUTPUT"
        else
          git commit -m "FilterFusion自动更新: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git"
          git push origin HEAD:main
          echo "deploy=true" >> "$GITHUB_OUTPUT"
        fi

  deploy:
    needs: update
    if: needs.update.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: "pages"
      cancel-in-progress: true

    steps:
    - name: 🛠️ 检出仓库
      uses: actions/checkout@v7.0.0
      with:
        fetch-depth: 1

    - name: ⚙️ 配置 Pages
      uses: actions/configure-pages@v6

    - name: 🚫 禁用 Jekyll
      run: touch dist/.nojekyll    # ✅ 禁止 Jekyll 处理，纯静态文件提速

    - name: 📦 上传产物
      uses: actions/upload-pages-artifact@v5
      with:
        path: 'dist'

    - name: 🚀 部署到 GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
